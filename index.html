<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Moderno</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header { background: #075e54; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-btn { cursor: pointer; font-size: 24px; font-weight: bold; }
        .logout-btn { cursor: pointer; font-size: 14px; background: #054a3f; padding: 6px 12px; border-radius: 20px; margin-left: 10px; }

        /* Lista de Contatos (Modal) */
        #contact-list { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; }
        .contact-item:hover { background: #f9f9f9; }

        /* Área de Chat */
        #chat-area { flex: 1; padding: 20px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #dcf8c6; padding: 10px 15px; border-radius: 8px; width: fit-content; max-width: 80%; align-self: flex-end; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message.received { background: white; align-self: flex-start; }
        .message strong { font-size: 12px; color: #075e54; display: block; margin-bottom: 4px; }
        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button#send-btn { padding: 5px 20px; border: none; border-radius: 20px; background: #075e54; color: white; cursor: pointer; }

        /* Tela de Login/Cadastro - responsiva e moderna */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #075e54, #128c7e);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-container h2 {
            color: #075e54;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .auth-container input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .auth-container input:focus {
            border-color: #075e54;
            box-shadow: 0 0 0 2px rgba(7,94,84,0.2);
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 25px;
            background: #075e54;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-container button:hover {
            background: #054a3f;
        }
        .auth-container .toggle-btn {
            background: transparent;
            color: #075e54;
            border: 1px solid #075e54;
            margin-top: 5px;
        }
        .auth-container .toggle-btn:hover {
            background: #e8f5e9;
        }
        .auth-container .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin: 8px 0;
            display: none;
        }
        .auth-container .success-msg {
            color: #2e7d32;
            font-size: 14px;
            margin: 8px 0;
            display: none;
        }
        .auth-container p {
            margin-top: 15px;
            color: #666;
            font-size: 13px;
        }
        @media (max-width: 480px) {
            .auth-container { padding: 25px 20px; }
            .auth-container h2 { font-size: 24px; }
        }
    </style>
    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD6sVu3hsBK0AyH4jxr3lj94Hj7JAj16_g",
            authDomain: "chat-94349.firebaseapp.com",
            projectId: "chat-94349",
            storageBucket: "chat-94349.firebasestorage.app",
            messagingSenderId: "1058859014174",
            appId: "1:1058859014174:web:19d7b3ceef6f6dda1e360f"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Variáveis globais
        let currentContact = null;
        let unsubscribe = null;
        let currentUserEmail = null;
        
        // Referências DOM
        const chatArea = document.getElementById('chat-area');
        const chatTitle = document.getElementById('chat-title');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const contactListDiv = document.getElementById('contact-list');
        const authScreen = document.getElementById('auth-screen');
        const header = document.querySelector('header');
        
        // Elementos da autenticação
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authConfirmPassword = document.getElementById('auth-confirm-password');
        const authError = document.getElementById('auth-error');
        const authSuccess = document.getElementById('auth-success');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authTitle = document.getElementById('auth-title');
        
        let isLoginMode = true; // true = login, false = cadastro
        
        // Funções de autenticação
        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
            setTimeout(() => { authError.style.display = 'none'; }, 4000);
        }
        
        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.style.display = 'block';
            setTimeout(() => { authSuccess.style.display = 'none'; }, 3000);
        }
        
        // Alternar entre login e cadastro
        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.textContent = 'Login';
                authSubmitBtn.textContent = 'Entrar';
                authToggleBtn.textContent = 'Criar nova conta';
                authConfirmPassword.style.display = 'none';
                authConfirmPassword.required = false;
            } else {
                authTitle.textContent = 'Cadastro';
                authSubmitBtn.textContent = 'Cadastrar';
                authToggleBtn.textContent = 'Já tenho uma conta';
                authConfirmPassword.style.display = 'block';
                authConfirmPassword.required = true;
            }
        };
        
        // Submeter formulário de auth
        window.submitAuth = async function() {
            const email = authEmail.value.trim();
            const password = authPassword.value.trim();
            const confirmPassword = authConfirmPassword.value.trim();
            
            if (!email || !password) {
                showError('Preencha e-mail e senha.');
                return;
            }
            
            if (!isLoginMode && password !== confirmPassword) {
                showError('As senhas não coincidem.');
                return;
            }
            
            if (password.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres.');
                return;
            }
            
            try {
                if (isLoginMode) {
                    // Login
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    showSuccess('Login realizado com sucesso!');
                    // O onAuthStateChanged cuidará de esconder a tela
                } else {
                    // Cadastro
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    showSuccess('Cadastro realizado com sucesso!');
                    // Após cadastro, já loga automaticamente
                }
            } catch (error) {
                console.error(error);
                let msg = 'Erro na autenticação. ';
                switch (error.code) {
                    case 'auth/email-already-in-use': msg = 'E-mail já cadastrado. Faça login.'; break;
                    case 'auth/invalid-email': msg = 'E-mail inválido.'; break;
                    case 'auth/user-not-found': msg = 'Usuário não encontrado.'; break;
                    case 'auth/wrong-password': msg = 'Senha incorreta.'; break;
                    case 'auth/weak-password': msg = 'Senha muito fraca. Use pelo menos 6 caracteres.'; break;
                    default: msg = error.message;
                }
                showError(msg);
            }
        };
        
        // Logout
        window.logout = async function() {
            try {
                await signOut(auth);
                // Resetar estado do chat
                if (unsubscribe) {
                    unsubscribe();
                    unsubscribe = null;
                }
                currentContact = null;
                chatTitle.innerText = 'Chat';
                chatArea.innerHTML = '<p id="placeholder" style="text-align: center; color: #777; margin-top: 20px;">Selecione um contato para começar</p>';
                currentUserEmail = null;
            } catch (error) {
                console.error('Erro ao sair:', error);
            }
        };
        
        // Funções do Chat (Mantidas e adaptadas)
        window.toggleContacts = function() {
            if (!currentUserEmail) return;
            const list = document.getElementById('contact-list');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        };
        
        // Função para enviar mensagem (com Firebase)
        window.sendMessage = async function() {
            if (!currentUserEmail) {
                alert("Faça login primeiro!");
                return;
            }
            if (!currentContact) {
                alert("Selecione um contato primeiro!");
                return;
            }
            
            const text = messageInput.value.trim();
            if (text === "") return;
            
            try {
                const messagesRef = collection(db, "conversas", currentContact, "mensagens");
                await addDoc(messagesRef, {
                    texto: text,
                    timestamp: serverTimestamp(),
                    enviadoPor: currentUserEmail,
                    nomeExibicao: currentUserEmail.split('@')[0]
                });
                messageInput.value = "";
            } catch (error) {
                console.error("Erro ao enviar mensagem: ", error);
                alert("Erro ao enviar mensagem.");
            }
        };
        
        // Carregar mensagens em tempo real
        function loadMessages(contactName) {
            if (unsubscribe) {
                unsubscribe();
                unsubscribe = null;
            }
            
            chatArea.innerHTML = "";
            
            const messagesRef = collection(db, "conversas", contactName, "mensagens");
            const q = query(messagesRef, orderBy("timestamp", "asc"));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                chatArea.innerHTML = "";
                
                if (snapshot.empty) {
                    const emptyMsg = document.createElement('p');
                    emptyMsg.style.textAlign = "center";
                    emptyMsg.style.color = "#777";
                    emptyMsg.style.marginTop = "20px";
                    emptyMsg.innerText = "Nenhuma mensagem ainda. Envie algo!";
                    chatArea.appendChild(emptyMsg);
                } else {
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const messageText = data.texto;
                        const sender = data.enviadoPor;
                        
                        const messageDiv = document.createElement('div');
                        if (sender === currentUserEmail) {
                            messageDiv.className = 'message';
                            messageDiv.innerText = messageText;
                        } else {
                            messageDiv.className = 'message received';
                            const strong = document.createElement('strong');
                            strong.innerText = sender ? sender.split('@')[0] : contactName;
                            messageDiv.appendChild(strong);
                            const textSpan = document.createElement('span');
                            textSpan.innerText = messageText;
                            messageDiv.appendChild(textSpan);
                        }
                        chatArea.appendChild(messageDiv);
                    });
                }
                chatArea.scrollTop = chatArea.scrollHeight;
            }, (error) => {
                console.error("Erro no listener:", error);
                chatArea.innerHTML = '<p style="text-align:center;color:red;">Erro ao carregar mensagens.</p>';
            });
        }
        
        // Iniciar conversa com contato
        window.startChat = function(name) {
            if (!currentUserEmail) {
                alert("Faça login primeiro!");
                return;
            }
            if (currentContact === name) {
                toggleContacts();
                return;
            }
            currentContact = name;
            chatTitle.innerText = name;
            loadMessages(name);
            toggleContacts();
            messageInput.focus();
        };
        
        // Simular resposta automática do contato (funcionalidade bônus)
        async function simulateAutoReply(contactName, userMessage, userEmail) {
            if (!currentContact || currentContact !== contactName) return;
            if (!userMessage || userMessage.trim() === "") return;
            
            setTimeout(async () => {
                if (currentContact !== contactName) return;
                
                let replyText = "";
                const lowerMsg = userMessage.toLowerCase();
                if (lowerMsg.includes("olá") || lowerMsg.includes("oi")) {
                    replyText = `Olá! Como posso ajudar? 😊`;
                } else if (lowerMsg.includes("tudo bem")) {
                    replyText = `Tudo ótimo, e você?`;
                } else if (lowerMsg.includes("obrigado")) {
                    replyText = `Por nada! 😄`;
                } else if (lowerMsg.includes("?")) {
                    replyText = `Ótima pergunta! Vou verificar.`;
                } else {
                    replyText = `Mensagem recebida: "${userMessage.substring(0, 40)}". Em breve responderei!`;
                }
                
                try {
                    const messagesRef = collection(db, "conversas", contactName, "mensagens");
                    await addDoc(messagesRef, {
                        texto: replyText,
                        timestamp: serverTimestamp(),
                        enviadoPor: `${contactName}@chat.local`,
                        nomeExibicao: contactName
                    });
                } catch (err) {
                    console.error("Erro na resposta automática:", err);
                }
            }, 2000);
        }
        
        // Sobrescrever sendMessage para incluir resposta automática
        const originalSend = window.sendMessage;
        window.sendMessage = async function() {
            if (!currentUserEmail || !currentContact) {
                if (!currentUserEmail) alert("Faça login primeiro!");
                else alert("Selecione um contato!");
                return;
            }
            const text = messageInput.value.trim();
            if (text === "") return;
            
            try {
                const messagesRef = collection(db, "conversas", currentContact, "mensagens");
                await addDoc(messagesRef, {
                    texto: text,
                    timestamp: serverTimestamp(),
                    enviadoPor: currentUserEmail,
                    nomeExibicao: currentUserEmail.split('@')[0]
                });
                messageInput.value = "";
                simulateAutoReply(currentContact, text, currentUserEmail);
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao enviar.");
            }
        };
        
        // Estado de autenticação
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Usuário logado
                currentUserEmail = user.email;
                authScreen.style.display = 'none';
                // Mostra o header e o chat completamente
                document.body.style.overflow = 'auto';
                // Limpar campos de autenticação
                authEmail.value = '';
                authPassword.value = '';
                authConfirmPassword.value = '';
                
                // Atualizar header com email e botão sair
                const headerRight = document.querySelector('header div:first-child') ? 
                    document.querySelector('header div') : document.createElement('div');
                let logoutBtnExists = document.getElementById('logout-btn-header');
                if (!logoutBtnExists) {
                    const logoutSpan = document.createElement('span');
                    logoutSpan.id = 'logout-btn-header';
                    logoutSpan.className = 'logout-btn';
                    logoutSpan.innerText = 'Sair';
                    logoutSpan.onclick = () => logout();
                    const addBtn = document.querySelector('.add-btn');
                    addBtn.parentNode.insertBefore(logoutSpan, addBtn.nextSibling);
                }
                // Mostrar email reduzido no título
                const userSpan = document.getElementById('user-email-display');
                if (!userSpan) {
                    const titleSpan = document.getElementById('chat-title');
                    const smallEmail = document.createElement('small');
                    smallEmail.id = 'user-email-display';
                    smallEmail.style.fontSize = '12px';
                    smallEmail.style.display = 'block';
                    smallEmail.style.opacity = '0.8';
                    smallEmail.innerText = user.email.split('@')[0];
                    titleSpan.parentNode.insertBefore(smallEmail, titleSpan.nextSibling);
                } else {
                    userSpan.innerText = user.email.split('@')[0];
                }
                
                // Resetar conversa atual
                if (currentContact) {
                    loadMessages(currentContact);
                } else {
                    chatArea.innerHTML = '<p id="placeholder" style="text-align: center; color: #777; margin-top: 20px;">Selecione um contato para começar</p>';
                }
            } else {
                // Usuário deslogado
                currentUserEmail = null;
                currentContact = null;
                if (unsubscribe) {
                    unsubscribe();
                    unsubscribe = null;
                }
                authScreen.style.display = 'flex';
                chatTitle.innerText = 'Chat';
                chatArea.innerHTML = '<p id="placeholder" style="text-align: center; color: #777; margin-top: 20px;">Faça login para usar o chat</p>';
                // Remover botão sair se existir
                const logoutBtn = document.getElementById('logout-btn-header');
                if (logoutBtn) logoutBtn.remove();
                const userSpanElem = document.getElementById('user-email-display');
                if (userSpanElem) userSpanElem.remove();
                // Resetar modo para login
                if (!isLoginMode) window.toggleAuthMode();
            }
        });
        
        // Evento Enter no input de mensagem
        document.getElementById('message-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.sendMessage();
        });
        
        // Eventos dos botões de autenticação
        document.getElementById('auth-submit-btn').onclick = () => window.submitAuth();
        document.getElementById('auth-toggle-btn').onclick = () => window.toggleAuthMode();
        
        // Inicializar tela de auth (já visível)
        authScreen.style.display = 'flex';
        // Configurar modo login inicial
        window.toggleAuthMode(); // Garante que confirmPassword fique escondido no início
        
        // Adicionar listener para fechar contatos ao clicar fora (melhoria)
        document.addEventListener('click', function(e) {
            const contactList = document.getElementById('contact-list');
            const addBtn = document.querySelector('.add-btn');
            if (contactList.style.display === 'block' && !contactList.contains(e.target) && e.target !== addBtn && !addBtn.contains(e.target)) {
                if (!e.target.closest('.contact-item')) {
                    contactList.style.display = 'none';
                }
            }
        });
        
        console.log("Firebase Auth + Chat pronto!");
    </script>
</head>
<body>

<header>
    <div style="display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;">
        <span id="chat-title">Chat</span>
    </div>
    <div class="add-btn" onclick="toggleContacts()">+</div>
</header>

<div id="contact-list">
    <h3>Selecione um contato</h3>
    <div class="contact-item" onclick="startChat('Ana Silva')">Ana Silva</div>
    <div class="contact-item" onclick="startChat('Bruno Souza')">Bruno Souza</div>
    <button onclick="toggleContacts()" style="margin-top: 20px; padding: 10px;">Fechar</button>
</div>

<div id="chat-area">
    <p id="placeholder" style="text-align: center; color: #777; margin-top: 20px;">Faça login para usar o chat</p>
</div>

<div class="input-area">
    <input type="text" id="message-input" placeholder="Digite uma mensagem...">
    <button id="send-btn" onclick="sendMessage()">Enviar</button>
</div>

<!-- Tela de Autenticação (Cadastro/Login) -->
<div id="auth-screen">
    <div class="auth-container">
        <h2 id="auth-title">Login</h2>
        <input type="email" id="auth-email" placeholder="E-mail" autocomplete="email">
        <input type="password" id="auth-password" placeholder="Senha" autocomplete="current-password">
        <input type="password" id="auth-confirm-password" placeholder="Confirmar senha" style="display: none;">
        <div id="auth-error" class="error-msg"></div>
        <div id="auth-success" class="success-msg"></div>
        <button id="auth-submit-btn">Entrar</button>
        <button id="auth-toggle-btn" class="toggle-btn">Criar nova conta</button>
        <p>🔒 Chat seguro com Firebase</p>
    </div>
</div>

</body>
</html>
