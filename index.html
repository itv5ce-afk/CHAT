    <!-- Service Worker para PWA e Notificações -->
    <script>
        // Registrar Service Worker para notificações em background
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Service Worker inline via Blob para funcionar sem arquivo externo
                const swCode = `
                    self.addEventListener('install', (event) => {
                        self.skipWaiting();
                    });
                    
                    self.addEventListener('activate', (event) => {
                        self.clients.claim();
                    });
                                        // Manipular clique na notificação
                    self.addEventListener('notificationclick', (event) => {
                        event.notification.close();
                        event.waitUntil(
                            clients.matchAll({ type: 'window', includeUncontrolled: true })
                                .then((clientList) => {
                                    // Se já existe uma janela do chat, focar nela
                                    for (const client of clientList) {
                                        if (client.url.includes(location.pathname) && 'focus' in client) {
                                            return client.focus();
                                        }
                                    }
                                    // Se não, abrir nova janela
                                    if (clients.openWindow) {
                                        return clients.openWindow('/');
                                    }
                                })
                        );
                    });
                    
                    // Manipular mensagens do push (para FCM futuro)
                    self.addEventListener('push', (event) => {
                        const data = event.data?.json() || {};
                        const title = data.title || '💬 Nova Mensagem';
                        const options = {
                            body: data.body || 'Você recebeu uma nova mensagem no Chat Moderno',
                            icon: data.icon || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23075e54"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="white">💬</text></svg>',
                            badge: data.badge,
                            tag: 'chat-message',
                            renotify: true,
                            requireInteraction: true,
                            actions: [
                                { action: 'open', title: 'Abrir Chat' },
                                { action: 'close', title: 'Fechar' }
                            ]
                        };
                        event.waitUntil(
                            self.registration.showNotification(title, options)
                        );
                    });
                `;
                
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(registration => {
                        console.log('✅ Service Worker registrado:', registration.scope);
                        // Salvar referência para notificações
                        window.swRegistration = registration;                    })
                    .catch(error => {
                        console.log('❌ Falha no registro do Service Worker:', error);
                    });
            });
        }
    </script>

        // ========== FUNÇÕES DE NOTIFICAÇÃO PUSH E SOM ==========
        
        // Solicitar permissão para notificações do navegador
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                console.log('Este navegador não suporta notificações desktop');
                return false;
            }
            
            if (Notification.permission === 'granted') {
                return true;
            }
            
            if (Notification.permission !== 'denied') {
                try {
                    const permission = await Notification.requestPermission();
                    return permission === 'granted';
                } catch (error) {
                    console.log('Erro ao solicitar permissão:', error);
                    return false;
                }
            }
            return false;
        }
        
        // Mostrar badge para solicitar permissão de notificação
        function showPermissionBadge() {            if (notificationPermissionRequested) return;
            if (!('Notification' in window) || Notification.permission === 'granted') return;
            
            let badge = document.getElementById('notification-permission-badge');
            if (!badge) {
                badge = document.createElement('div');
                badge.id = 'notification-permission-badge';
                badge.className = 'permission-badge';
                badge.innerHTML = '🔔 Ativar notificações';
                badge.onclick = async () => {
                    const granted = await requestNotificationPermission();
                    badge.classList.remove('show');
                    notificationPermissionRequested = true;
                    if (granted) {
                        showToast('✅ Notificações ativadas!');
                        setupForegroundNotifications();
                    }
                };
                document.body.appendChild(badge);
            }
            setTimeout(() => badge.classList.add('show'), 3000);
        }
        
        // Configurar notificações em primeiro plano (quando app está aberto mas em background)
        function setupForegroundNotifications() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            
            // Detectar quando a página está em background
            document.addEventListener('visibilitychange', () => {
                window.isPageVisible = !document.hidden;
            });
            window.isPageVisible = !document.hidden;
        }
        
        // Mostrar notificação do sistema
        function showSystemNotification(title, body, contactName) {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            
            // Não mostrar se a página está visível e o contato está sendo visualizado
            if (window.isPageVisible && currentContact === contactName) return;
            
            const icon = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23075e54"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="white">💬</text></svg>';
            
            const notification = new Notification(title, {
                body: body,
                icon: icon,
                badge: icon,
                tag: `chat-${contactName}-${Date.now()}`,
                renotify: true,
                requireInteraction: true            });
            
            // Clique na notificação
            notification.onclick = function() {
                window.focus();
                if (currentContact !== contactName && friendsList.includes(contactName)) {
                    startChatFromMain(contactName, friendlyNameMap[contactName] || contactName.split('@')[0]);
                }
                notification.close();
            };
            
            // Auto-fechar após 5 segundos
            setTimeout(() => notification.close(), 5000);
        }
        
        // Carregar som salvo do localStorage
        function loadNotificationSound() {
            const savedSound = localStorage.getItem('notificationSound');
            if (savedSound) {
                notificationSound = new Audio(savedSound);
                notificationSound.volume = 0.7;

        // Tocar som de notificação com retry para autoplay
        function playNotificationSound() {
            if (!notificationSound) return;
            
            const playAudio = () => {
                notificationSound.currentTime = 0;
                notificationSound.play()
                    .catch(e => {
                        // Se falhar (autoplay bloqueado), tentar novamente após interação
                        console.log('Autoplay bloqueado, aguardando interação:', e);
                        // Adicionar listener para tentar após próximo clique/toque
                        const unlock = () => {
                            notificationSound.play().catch(() => {});
                            ['click', 'touchstart', 'keydown'].forEach(evt => 
                                document.removeEventListener(evt, unlock)
                            );
                        };
                        ['click', 'touchstart', 'keydown'].forEach(evt => 
                            document.addEventListener(evt, unlock, { once: true })
                        );
                    });            };
            
            // Tentar tocar imediatamente
            playAudio();
        }

        // Processar arquivo de som selecionado
        function handleSoundFile(file) {
            if (!file) return;
            
            // Verificar tipo de arquivo
            if (!file.type.startsWith('audio/')) {
                showToast('Selecione um arquivo de áudio válido');
                return;
            }
            
            // Verificar tamanho (máx 3MB para localStorage)
            if (file.size > 3 * 1024 * 1024) {
                showToast('Arquivo muito grande. Máximo 3MB.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const audioData = e.target.result;
                // Salvar no localStorage
                localStorage.setItem('notificationSound', audioData);
                // Atualizar objeto de áudio
                notificationSound = new Audio(audioData);
                notificationSound.volume = 0.7;
                showToast('Som de notificação atualizado! 🔔');
                // Testar o som
                playNotificationSound();
            };
            reader.onerror = function() {
                showToast('Erro ao carregar arquivo');
            };
            reader.readAsDataURL(file);
        }

        function filterContacts(searchTerm) {
            if (!searchTerm.trim()) {
                const contacts = friendsList.map(email => ({
                    email: email,
                    name: friendlyNameMap[email] || email.split('@')[0],
                    initial: (friendlyNameMap[email] || email.split('@')[0]).charAt(0).toUpperCase()
                }));
                renderContactsList(contacts);
                return;
            }
            
            const term = searchTerm.toLowerCase().trim();
            const filtered = friendsList.filter(email => {
                const name = (friendlyNameMap[email] || email.split('@')[0]).toLowerCase();
                const emailLower = email.toLowerCase();
                return name.includes(term) || emailLower.includes(term);
            }).map(email => ({
                email: email,
                name: friendlyNameMap[email] || email.split('@')[0],
                initial: (friendlyNameMap[email] || email.split('@')[0]).charAt(0).toUpperCase()
            }));
            renderContactsList(filtered);
        }        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {

                return m;
            });

        function startUnreadListener(contactEmail, contactName) {
            if (!currentUserEmail) return;
            if (unreadListeners.has(contactEmail)) {
                unreadListeners.get(contactEmail)();
                unreadListeners.delete(contactEmail);
            }
            
            const conversationId = getConversationId(currentUserEmail, contactEmail);
            const messagesRef = collection(db, "conversas", conversationId, "mensagens");
            const q = query(messagesRef, orderBy("timestamp", "desc"));
            const lastReadRef = doc(db, "leituras", `${currentUserEmail}_${contactEmail}`);
            
            const unsubscribeListener = onSnapshot(q, async (snapshot) => {
                if (snapshot.empty) return;
                const isCurrentConversation = (currentContact === contactEmail);
                const lastMessage = snapshot.docs[0];
                const lastMessageData = lastMessage.data();
                const lastMessageTimestamp = lastMessageData.timestamp;
                const lastMessageSender = lastMessageData.enviadoPor;
                
                if (lastMessageSender === currentUserEmail) {
                    stopBlinking(contactEmail);
                    return;
                }
                
                const lastReadDoc = await getDoc(lastReadRef);
                let lastReadTimestamp = null;
                if (lastReadDoc.exists()) {
                    lastReadTimestamp = lastReadDoc.data().lastRead;                }
                
                const needBlink = (!lastReadTimestamp || 
                    (lastMessageTimestamp && lastMessageTimestamp.toDate() > lastReadTimestamp.toDate()));
                
                if (needBlink && !isCurrentConversation) {
                    if (!blinkingContacts.has(contactEmail)) {
                        blinkingContacts.add(contactEmail);
                        const contactElement = document.querySelector(`.contact-item-main[data-email="${contactEmail}"]`);
                        if (contactElement) {
                            contactElement.classList.add('blinking');
                        }
                        
                        // 🔔 TOCAR SOM DE NOTIFICAÇÃO
                        playNotificationSound();
                        
                        // 📱 MOSTRAR NOTIFICAÇÃO DO SISTEMA
                        const senderName = friendlyNameMap[lastMessageSender] || lastMessageSender.split('@')[0];
                        const messagePreview = lastMessageData.texto?.substring(0, 50) + (lastMessageData.texto?.length > 50 ? '...' : '');
                        
                        // Tentar notificação do sistema
                        if ('Notification' in window && Notification.permission === 'granted') {
                            showSystemNotification(
                                `💬 Nova mensagem de ${senderName}`,
                                messagePreview || 'Toque para ver',
                                contactEmail
                            );
                        } else {
                            // Fallback: toast visual
                            showToast(`🔔 ${senderName}: ${messagePreview || 'Nova mensagem'}`);
                        }
                    }
                } else {
                    stopBlinking(contactEmail);
                }
            });
            
            unreadListeners.set(contactEmail, unsubscribeListener);
        }

                if (permission === 'granted') {
                    const token = await getToken(messaging, {
                        vapidKey: "YOUR_VAPID_KEY_HERE" // Substitua pela sua VAPID Key do Firebase
                    });
                    console.log('FCM Token:', token);
                    // Salvar token no usuário para envio de push via Cloud Functions
                    if (currentUserEmail) {
                        await setDoc(doc(db, "usuarios", currentUserEmail.replace(/\./g, '_')), {
                            fcmToken: token
                        }, { merge: true });
                    }
                }
                
                // Listener para mensagens em primeiro plano
                onMessage(messaging, (payload) => {
                    console.log('Mensagem FCM recebida:', payload);
                    const title = payload.notification?.title || '💬 Nova Mensagem';
                    const body = payload.notification?.body || 'Você recebeu uma nova mensagem';
                    const contactEmail = payload.data?.contactEmail;
                    
                    // Tocar som
                    playNotificationSound();
                    // Mostrar notificação
                    showSystemNotification(title, body, contactEmail);
                });
            } catch (error) {
                console.log('Erro ao configurar FCM:', error);
            }
        }
        
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('settings-menu');
            const settingsBtn = document.querySelector('.settings-btn');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) {
                menu.classList.remove('show');
            }
            const panel = document.getElementById('notification-panel');
            const notifBtn = document.getElementById('notification-btn');
            if (panel && panel.classList.contains('show') && !panel.contains(e.target) && e.target !== notifBtn && !notifBtn.contains(e.target)) {
                panel.classList.remove('show');
            }
        });
        
        document.getElementById('message-input')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.sendMessage();
        });        
        // Estado de autenticação
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserEmail = user.email;
                currentUserDisplayName = user.email.split('@')[0];
                await registerUserInDirectory(currentUserEmail);
                authScreen.style.display = 'none';
                document.body.style.overflow = 'auto';
                authEmail.value = '';
                authPassword.value = '';
                authConfirmPassword.value = '';
                
                mainScreen.classList.remove('hidden');
                chatContainer.classList.add('hidden');
                
                // Carregar som de notificação salvo
                loadNotificationSound();
                
                // Configurar notificações
                setupForegroundNotifications();
                showPermissionBadge();
                
                // Tentar configurar FCM para push notifications reais
                setupFCM();
                
                // Carregar amigos e solicitações
                await loadFriendsAndContacts();
                loadPendingRequests();
            } else {
                for (const [email, unsubscribeFn] of unreadListeners) {
                    unsubscribeFn();
                }
                unreadListeners.clear();
                blinkingContacts.clear();
                if (pendingRequestsListener) pendingRequestsListener();
                friendsList = [];
                currentUserEmail = null;
                currentContact = null;
                if (unsubscribe) unsubscribe();
                authScreen.style.display = 'flex';
                chatTitle.innerText = 'Chat';
                chatArea.innerHTML = '<p style="text-align: center; color: #777; margin-top: 20px;">Faça login para conversar</p>';
                mainScreen.classList.add('hidden');
                chatContainer.classList.add('hidden');
                notificationBadge.style.display = 'none';
                if (!isLoginMode) window.toggleAuthMode();
            }
        });
                document.getElementById('auth-submit-btn').onclick = () => window.submitAuth();
        document.getElementById('auth-toggle-btn').onclick = () => window.toggleAuthMode();
        window.toggleAuthMode();
        authScreen.style.display = 'flex';
        
        // Expor funções para o escopo global
        window.filterContacts = filterContacts;
        window.addFriendFromMain = () => window.sendFriendRequest();
        
        // Listener para seleção de arquivo de som
        document.getElementById('sound-file-input')?.addEventListener('change', function(e) {
            handleSoundFile(e.target.files[0]);
            e.target.value = '';
        });
        
        // Detectar quando o app é fechado/minimizado para manter notificações ativas
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('App em background - notificações do sistema ativas');
            }
        });
        
        // Antes do unload, garantir que service worker continue ativo
        window.addEventListener('beforeunload', () => {
            if (window.swRegistration) {
                // Manter SW ativo por mais tempo
                window.swRegistration.active?.postMessage({ type: 'KEEP_ALIVE' });
            }
        });
        
        console.log("✅ Chat Moderno carregado com notificações push e som em background! 🔔📱");
    </script>
</head>
<body>

<header>
    <div style="display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;">
        <span id="chat-title">Chat</span>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <div class="notification-container">
            <div class="notification-btn" id="notification-btn" onclick="toggleNotificationPanel()">
                🔔
                <div class="notification-badge" id="notification-badge" style="display: none;">0</div>
            </div>
            <div class="notification-panel" id="notification-panel">
                <div class="notification-header">Solicitações de Amizade</div>
                <div class="notification-list" id="notification-list">
                    <div class="no-requests">Nenhuma solicitação pendente</div>
                </div>            </div>
        </div>
        <div class="back-btn" onclick="goToMainScreen()">⬅️</div>
        <div class="settings-container">
            <div class="settings-btn" onclick="toggleSettingsMenu()">⚙️</div>
            <div id="settings-menu" class="settings-menu">
                <div class="settings-menu-item" onclick="sendFriendRequest()">
                    ➕ Adicionar Amigo
                </div>
                <div class="settings-menu-item" onclick="window.clearMessages?.()">
                    🗑️ Limpar Mensagens
                </div>
                <div class="settings-menu-item" onclick="selectNotificationSound()">
                    🔔 Som de Notificação
                    <input type="file" id="sound-file-input" accept="audio/*">
                </div>
                <div class="settings-menu-item danger" onclick="logout()">
                    🚪 Sair
                </div>
            </div>
        </div>
    </div>
</header>

<div id="contact-list">
    <h3>Selecione um contato</h3>
</div>

<div id="main-screen" class="main-screen hidden">
    <h2>💬 Seus Amigos</h2>
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar amigo por nome ou e-mail..." onkeyup="filterContacts(this.value)">
        <span class="search-icon">🔍</span>
        <span class="clear-search" onclick="clearSearch()">✖</span>
    </div>
    <div id="contact-list-main" class="contact-list-main"></div>
    <button class="add-friend-btn" onclick="addFriendFromMain()">
        ➕ Adicionar amigo por e-mail
    </button>
</div>

<div id="chat-container" class="hidden">
    <div id="chat-area">
        <p id="placeholder" style="text-align: center; color: #777; margin-top: 20px;">Selecione um contato para começar</p>
    </div>
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Digite uma mensagem...">
        <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
</div>
<div id="auth-screen">
    <div class="auth-container">
        <h2 id="auth-title">Login</h2>
        <input type="email" id="auth-email" placeholder="E-mail" autocomplete="email">
        <input type="password" id="auth-password" placeholder="Senha" autocomplete="current-password">
        <input type="password" id="auth-confirm-password" placeholder="Confirmar senha" style="display: none;">
        <div id="auth-error" class="error-msg"></div>
        <div id="auth-success" class="success-msg"></div>
        <button id="auth-submit-btn">Entrar</button>
        <button id="auth-toggle-btn" class="toggle-btn">Criar nova conta</button>
        <p>🔒 Chat seguro - Envie solicitações de amizade para conversar!</p>
    </div>
</div>

</body>
</html>
