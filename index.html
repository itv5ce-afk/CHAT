<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#075e54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #e5ddd5;
            height: 100vh;
            overflow: hidden;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        .login-container h1 {
            color: #075e54;
            text-align: center;
            margin-bottom: 10px;            font-size: 32px;
        }

        .login-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .login-container input:focus {
            border-color: #075e54;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: #075e54;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-container button:hover {
            background: #054a3f;
        }

        .login-container .toggle-btn {
            background: transparent;
            color: #075e54;
            border: 2px solid #075e54;
        }

        .login-container .toggle-btn:hover {            background: #e8f5e9;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        /* Header Principal */
        .header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        /* Menu da Engrenagem (Tela Principal) */
        .settings-container {
            position: relative;
        }

        .settings-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: white;
            min-width: 220px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 500;
            overflow: hidden;
        }

        .settings-menu.show {
            display: block;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-menu-item {
            padding: 14px 18px;
            cursor: pointer;
            color: #333;
            font-size: 14px;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .settings-menu-item:last-child {
            border-bottom: none;
        }

        .settings-menu-item:hover {
            background: #f0f2f5;
        }

        .settings-menu-item.danger {            color: #d32f2f;
        }

        .settings-menu-item.danger:hover {
            background: #ffebee;
        }

        .settings-menu-item input[type="file"] {
            display: none;
        }

        .settings-menu-item .menu-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .settings-menu-item .menu-text {
            flex: 1;
        }

        .settings-menu-item .menu-status {
            font-size: 11px;
            color: #25d366;
            font-weight: bold;
        }

        /* Tela Principal - Lista de Conversas */
        #main-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        #main-screen.active {
            display: flex;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;            transition: background 0.2s;
            position: relative;
        }

        .conversation-item:hover {
            background: #f5f5f5;
        }

        .conversation-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #075e54;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .conversation-last-message {
            color: #666;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-time {
            font-size: 12px;
            color: #999;
            margin-left: 10px;
        }

        .unread-badge {            background: #25d366;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }

        .no-conversations {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-conversations h3 {
            margin-bottom: 10px;
            color: #666;
        }

        /* Animação de piscar na conversa */
        @keyframes blinkConversation {
            0%, 100% { background: white; }
            50% { background: #fff3cd; }
        }

        .conversation-item.blinking {
            animation: blinkConversation 0.6s infinite;
        }

        /* Tela de Chat */
        #chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        #chat-screen.active {
            display: flex;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-button {
            background: rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-contact-info {
            flex: 1;
        }

        .chat-contact-name {
            font-weight: 500;
            font-size: 18px;
        }

        .chat-contact-status {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Animação de piscar no nome do chat */
        @keyframes blinkName {
            0%, 100% { color: white; text-shadow: none; }
            50% { color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; }
        }

        .chat-contact-name.blinking {
            animation: blinkName 0.6s infinite;
        }

        /* Menu do Chat */
        .chat-menu-container {
            position: relative;        }

        .chat-menu-btn {
            background: rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        .chat-menu-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background: white;
            min-width: 220px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 500;
            overflow: hidden;
        }

        .chat-menu.show {
            display: block;
            animation: fadeIn 0.2s;
        }

        .chat-menu-item {
            padding: 14px 18px;
            cursor: pointer;
            color: #333;
            font-size: 14px;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-menu-item:last-child {            border-bottom: none;
        }

        .chat-menu-item:hover {
            background: #f0f2f5;
        }

        .chat-menu-item.danger {
            color: #d32f2f;
        }

        .chat-menu-item.danger:hover {
            background: #ffebee;
        }

        .chat-menu-item input[type="file"] {
            display: none;
        }

        .chat-menu-item .menu-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .chat-menu-item .menu-text {
            flex: 1;
        }

        .chat-menu-item .menu-status {
            font-size: 11px;
            color: #25d366;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;            position: relative;
        }

        .message.sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            margin-bottom: 5px;
            font-size: 15px;
        }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .message-time {
            font-size: 11px;
            color: #666;
            text-align: right;
        }

        .message-input-area {
            padding: 15px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
            align-items: center;
        }

        .message-input-area input[type="text"] {
            flex: 1;
            padding: 12px 20px;            border: none;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            background: white;
        }

        .send-button {
            background: #075e54;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.3s;
        }

        .send-button:hover {
            background: #054a3f;
        }

        /* Modal Adicionar Contato */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {            margin-bottom: 20px;
            color: #075e54;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .modal-content input:focus {
            border-color: #075e54;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-confirm {
            background: #075e54;
            color: white;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
        }

        /* Modal de visualização de imagem */
        .image-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .image-viewer.active {
            display: flex;
        }

        .image-viewer img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        /* Toast de notificação */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 5000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .message {
                max-width: 85%;            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        ::-webkit-scrollbar-thumb {
            background: #075e54;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #054a3f;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

<!-- Tela de Login -->
<div id="login-screen">
    <div class="login-container">
        <h1>💬 iChat</h1>
        <p class="subtitle">Conecte-se com seus amigos</p>
        <input type="email" id="login-email" placeholder="E-mail" autocomplete="email">
        <input type="password" id="login-password" placeholder="Senha" autocomplete="current-password">
        <div id="login-error" class="error-msg"></div>
        <button id="login-btn">Entrar</button>
        <button id="register-btn" class="toggle-btn">Criar Conta</button>
    </div>
</div>

<!-- Tela Principal -->
<div id="main-screen">
    <div class="header">
        <h2>Conversas</h2>
        <div class="header-actions">
            <div class="settings-container">
                <div class="header-btn" id="settings-btn" title="Configurações">⚙️</div>                <div class="settings-menu" id="settings-menu">
                    <div class="settings-menu-item" id="settings-add-contact">
                        <span class="menu-icon">➕</span>
                        <span class="menu-text">Adicionar Contato</span>
                    </div>
                    <div class="settings-menu-item" id="settings-sound">
                        <span class="menu-icon">🔔</span>
                        <span class="menu-text">Som de Notificação</span>
                        <span class="menu-status" id="sound-status"></span>
                        <input type="file" id="settings-sound-input" accept="audio/*">
                    </div>
                    <div class="settings-menu-item danger" id="settings-logout">
                        <span class="menu-icon">🚪</span>
                        <span class="menu-text">Sair</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="conversations-list" id="conversations-list">
        <div class="loading">Carregando conversas...</div>
    </div>
</div>

<!-- Tela de Chat -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="back-button" id="back-btn">⬅️</div>
        <div class="conversation-avatar" id="chat-avatar">U</div>
        <div class="chat-contact-info">
            <div class="chat-contact-name" id="chat-contact-name">Contato</div>
            <div class="chat-contact-status" id="chat-contact-status">online</div>
        </div>
        <div class="chat-menu-container">
            <div class="chat-menu-btn" id="chat-menu-btn" title="Menu">☰</div>
            <div class="chat-menu" id="chat-menu">
                <div class="chat-menu-item" id="menu-clear-messages">
                    <span class="menu-icon">🗑️</span>
                    <span class="menu-text">Limpar mensagens</span>
                </div>
                <div class="chat-menu-item" id="menu-camera">
                    <span class="menu-icon">📷</span>
                    <span class="menu-text">Foto (Câmera)</span>
                    <input type="file" id="camera-input" accept="image/*" capture="environment">
                </div>
                <div class="chat-menu-item" id="menu-gallery">
                    <span class="menu-icon">🖼️</span>
                    <span class="menu-text">Anexos (Galeria)</span>
                    <input type="file" id="gallery-input" accept="image/*">
                </div>                <div class="chat-menu-item" id="menu-sound">
                    <span class="menu-icon">🔔</span>
                    <span class="menu-text">Som de Notificação</span>
                    <span class="menu-status" id="chat-sound-status"></span>
                    <input type="file" id="sound-input" accept="audio/*">
                </div>
            </div>
        </div>
    </div>
    <div class="messages-area" id="messages-area">
        <div class="loading">Carregando mensagens...</div>
    </div>
    <div class="message-input-area">
        <input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off">
        <button class="send-button" id="send-btn">➤</button>
    </div>
</div>

<!-- Modal Adicionar Contato -->
<div class="modal" id="add-contact-modal">
    <div class="modal-content">
        <h3>Adicionar Novo Contato</h3>
        <input type="email" id="new-contact-email" placeholder="E-mail do contato">
        <input type="text" id="new-contact-name" placeholder="Nome do contato (opcional)">
        <div class="modal-buttons">
            <button class="btn-cancel" id="cancel-add-contact">Cancelar</button>
            <button class="btn-confirm" id="confirm-add-contact">Adicionar</button>
        </div>
    </div>
</div>

<!-- Visualizador de Imagem -->
<div class="image-viewer" id="image-viewer">
    <img id="viewer-image" src="" alt="Imagem">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD6sVu3hsBK0AyH4jxr3lj94Hj7JAj16_g",
        authDomain: "chat-94349.firebaseapp.com",
        projectId: "chat-94349",        storageBucket: "chat-94349.firebasestorage.app",
        messagingSenderId: "1058859014174",
        appId: "1:1058859014174:web:19d7b3ceef6f6dda1e360f"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Variáveis globais
    let currentUser = null;
    let currentChat = null;
    let contacts = [];
    let conversations = [];
    let messagesListener = null;
    let conversationsListener = null;
    let notificationSound = null;
    let soundEnabled = false;

    // Elementos DOM
    const loginScreen = document.getElementById('login-screen');
    const mainScreen = document.getElementById('main-screen');
    const chatScreen = document.getElementById('chat-screen');
    const loginEmail = document.getElementById('login-email');
    const loginPassword = document.getElementById('login-password');
    const loginError = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const logoutBtn = document.getElementById('settings-logout');
    const addContactBtn = document.getElementById('settings-add-contact');
    const backBtn = document.getElementById('back-btn');
    const sendBtn = document.getElementById('send-btn');
    const messageInput = document.getElementById('message-input');
    const messagesArea = document.getElementById('messages-area');
    const conversationsList = document.getElementById('conversations-list');
    const addContactModal = document.getElementById('add-contact-modal');
    const cancelAddContact = document.getElementById('cancel-add-contact');
    const confirmAddContact = document.getElementById('confirm-add-contact');
    const chatMenuBtn = document.getElementById('chat-menu-btn');
    const chatMenu = document.getElementById('chat-menu');
    const chatContactName = document.getElementById('chat-contact-name');
    const imageViewer = document.getElementById('image-viewer');
    const viewerImage = document.getElementById('viewer-image');
    const toast = document.getElementById('toast');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');

    // ========== FUNÇÕES DE TOAST ==========
    function showToast(message, duration = 3000) {        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    // ========== FUNÇÕES DE SOM DE NOTIFICAÇÃO ==========
    function loadSavedSound() {
        const savedSound = localStorage.getItem('ichat_notification_sound');
        if (savedSound) {
            notificationSound = new Audio(savedSound);
            notificationSound.volume = 0.7;
            soundEnabled = true;
            updateSoundStatus(true);
        }
    }

    function updateSoundStatus(enabled) {
        const statusEl = document.getElementById('sound-status');
        const chatStatusEl = document.getElementById('chat-sound-status');
        if (statusEl) {
            statusEl.textContent = enabled ? '✓ Ativo' : '';
        }
        if (chatStatusEl) {
            chatStatusEl.textContent = enabled ? '✓ Ativo' : '';
        }
    }

    function playNotificationSound() {
        if (!notificationSound || !soundEnabled) return;
        
        const play = () => {
            notificationSound.currentTime = 0;
            notificationSound.play().catch(e => {
                console.log('Autoplay bloqueado, aguardando interação:', e);
                const unlock = () => {
                    notificationSound.play().catch(() => {});
                    ['click', 'touchstart', 'keydown'].forEach(evt => 
                        document.removeEventListener(evt, unlock)
                    );
                };
                ['click', 'touchstart', 'keydown'].forEach(evt => 
                    document.addEventListener(evt, unlock, { once: true })
                );
            });
        };
        
        play();
    }
    function handleSoundFile(file) {
        if (!file) return;
        
        if (!file.type.startsWith('audio/')) {
            showToast('❌ Selecione um arquivo de áudio válido');
            return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
            showToast('❌ Arquivo muito grande. Máximo 5MB.');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const audioData = e.target.result;
            localStorage.setItem('ichat_notification_sound', audioData);
            notificationSound = new Audio(audioData);
            notificationSound.volume = 0.7;
            soundEnabled = true;
            updateSoundStatus(true);
            showToast('🔔 Som de notificação ativado!');
            // Tocar som para testar
            notificationSound.play().catch(() => {});
            // Fechar menus
            settingsMenu.classList.remove('show');
            chatMenu.classList.remove('show');
        };
        reader.onerror = function() {
            showToast('❌ Erro ao carregar arquivo');
        };
        reader.readAsDataURL(file);
    }

    // ========== FUNÇÕES DE AUTENTICAÇÃO ==========
    async function login() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        if (!email || !password) {
            showError('Preencha todos os campos');
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            let message = 'Erro ao fazer login';
            if (error.code === 'auth/user-not-found') message = 'Usuário não encontrado';            else if (error.code === 'auth/wrong-password') message = 'Senha incorreta';
            else if (error.code === 'auth/invalid-email') message = 'E-mail inválido';
            showError(message);
        }
    }

    async function register() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        if (!email || !password) {
            showError('Preencha todos os campos');
            return;
        }

        if (password.length < 6) {
            showError('A senha deve ter no mínimo 6 caracteres');
            return;
        }

        try {
            await createUserWithEmailAndPassword(auth, email, password);
            
            // Registrar usuário no Firestore
            await setDoc(doc(db, "usuarios", email.replace(/\./g, '_')), {
                email: email,
                displayName: email.split('@')[0],
                createdAt: serverTimestamp(),
                contacts: []
            });
        } catch (error) {
            let message = 'Erro ao criar conta';
            if (error.code === 'auth/email-already-in-use') message = 'E-mail já cadastrado';
            else if (error.code === 'auth/invalid-email') message = 'E-mail inválido';
            showError(message);
        }
    }

    async function logout() {
        try {
            await signOut(auth);
            settingsMenu.classList.remove('show');
        } catch (error) {
            console.error('Erro ao sair:', error);
        }
    }

    function showError(message) {
        loginError.textContent = message;
        loginError.style.display = 'block';        setTimeout(() => {
            loginError.style.display = 'none';
        }, 3000);
    }

    // ========== FUNÇÕES DE CONTATO ==========
    async function addContact() {
        const email = document.getElementById('new-contact-email').value.trim();
        const name = document.getElementById('new-contact-name').value.trim();

        if (!email) {
            alert('Digite o e-mail do contato');
            return;
        }

        if (email === currentUser.email) {
            alert('Você não pode adicionar a si mesmo');
            return;
        }

        try {
            // Verificar se o usuário existe
            const userDoc = await getDoc(doc(db, "usuarios", email.replace(/\./g, '_')));
            if (!userDoc.exists()) {
                alert('Usuário não encontrado. Certifique-se de que a pessoa já está cadastrada.');
                return;
            }

            // Adicionar contato
            await setDoc(doc(db, "contatos", `${currentUser.email.replace(/\./g, '_')}_${email.replace(/\./g, '_')}`), {
                userEmail: currentUser.email,
                contactEmail: email,
                displayName: name || email.split('@')[0],
                addedAt: serverTimestamp()
            });

            // Adicionar aos contatos do outro usuário (recíproco)
            await setDoc(doc(db, "contatos", `${email.replace(/\./g, '_')}_${currentUser.email.replace(/\./g, '_')}`), {
                userEmail: email,
                contactEmail: currentUser.email,
                displayName: currentUser.email.split('@')[0],
                addedAt: serverTimestamp()
            });

            showToast('✅ Contato adicionado com sucesso!');
            closeAddContactModal();
            loadContacts();
            settingsMenu.classList.remove('show');
        } catch (error) {
            console.error('Erro ao adicionar contato:', error);            alert('Erro ao adicionar contato');
        }
    }

    function loadContacts() {
        if (!currentUser) return;

        const contactsQuery = query(
            collection(db, "contatos"),
            where("userEmail", "==", currentUser.email)
        );

        onSnapshot(contactsQuery, async (snapshot) => {
            contacts = [];
            snapshot.forEach(doc => {
                contacts.push({ id: doc.id, ...doc.data() });
            });
            loadConversations();
        });
    }

    // ========== FUNÇÕES DE CONVERSA ==========
    function loadConversations() {
        if (!currentUser || contacts.length === 0) {
            conversationsList.innerHTML = `
                <div class="no-conversations">
                    <h3>Nenhuma conversa ainda</h3>
                    <p>Adicione contatos para começar a conversar!</p>
                </div>
            `;
            return;
        }

        conversationsList.innerHTML = '';

        contacts.forEach(contact => {
            const conversationId = getConversationId(currentUser.email, contact.contactEmail);
            
            const messagesQuery = query(
                collection(db, "conversas", conversationId, "mensagens"),
                orderBy("timestamp", "desc")
            );

            const itemDiv = document.createElement('div');
            itemDiv.className = 'conversation-item';
            itemDiv.setAttribute('data-email', contact.contactEmail);
            itemDiv.onclick = () => openChat(contact);

            const avatar = document.createElement('div');
            avatar.className = 'conversation-avatar';            avatar.textContent = contact.displayName.charAt(0).toUpperCase();

            const infoDiv = document.createElement('div');
            infoDiv.className = 'conversation-info';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'conversation-name';
            nameDiv.textContent = contact.displayName;

            const lastMsgDiv = document.createElement('div');
            lastMsgDiv.className = 'conversation-last-message';
            lastMsgDiv.textContent = 'Carregando...';

            infoDiv.appendChild(nameDiv);
            infoDiv.appendChild(lastMsgDiv);

            itemDiv.appendChild(avatar);
            itemDiv.appendChild(infoDiv);
            conversationsList.appendChild(itemDiv);

            // Listener para última mensagem
            let previousMessageCount = 0;
            const unsubscribe = onSnapshot(messagesQuery, (snapshot) => {
                const currentMessageCount = snapshot.size;
                const isNewMessage = currentMessageCount > previousMessageCount && previousMessageCount > 0;
                const lastDoc = snapshot.docs[0];
                const lastMsgData = lastDoc ? lastDoc.data() : null;
                const isFromOtherUser = lastMsgData && lastMsgData.enviadoPor !== currentUser.email;

                if (!snapshot.empty) {
                    const lastMsg = snapshot.docs[0].data();
                    if (lastMsg.tipo === 'imagem') {
                        lastMsgDiv.textContent = '📷 Foto';
                    } else {
                        lastMsgDiv.textContent = lastMsg.texto;
                    }
                } else {
                    lastMsgDiv.textContent = 'Nenhuma mensagem ainda';
                }

                // 🔔 NOTIFICAÇÃO NA TELA PRINCIPAL: tocar som e piscar conversa quando chega nova mensagem
                if (isNewMessage && isFromOtherUser) {
                    playNotificationSound();
                    itemDiv.classList.add('blinking');
                    
                    // Remover piscar após 5 segundos
                    setTimeout(() => {
                        itemDiv.classList.remove('blinking');
                    }, 5000);
                }
                previousMessageCount = currentMessageCount;
            });
        });
    }

    // ========== FUNÇÕES DE CHAT ==========
    function openChat(contact) {
        currentChat = contact;
        
        document.getElementById('chat-avatar').textContent = contact.displayName.charAt(0).toUpperCase();
        chatContactName.textContent = contact.displayName;
        chatContactName.classList.remove('blinking');
        document.getElementById('chat-contact-status').textContent = 'online';

        mainScreen.classList.remove('active');
        chatScreen.classList.add('active');

        // Remover piscar da conversa na tela principal
        const conversationItem = document.querySelector(`.conversation-item[data-email="${contact.contactEmail}"]`);
        if (conversationItem) {
            conversationItem.classList.remove('blinking');
        }

        loadMessages();
        messageInput.focus();
    }

    function closeChat() {
        if (messagesListener) {
            messagesListener();
            messagesListener = null;
        }
        chatContactName.classList.remove('blinking');
        currentChat = null;
        chatScreen.classList.remove('active');
        mainScreen.classList.add('active');
        chatMenu.classList.remove('show');
    }

    function loadMessages() {
        if (!currentUser || !currentChat) return;

        const conversationId = getConversationId(currentUser.email, currentChat.contactEmail);
        const messagesQuery = query(
            collection(db, "conversas", conversationId, "mensagens"),
            orderBy("timestamp", "asc")
        );

        messagesArea.innerHTML = '';
        let previousMessageCount = 0;

        messagesListener = onSnapshot(messagesQuery, (snapshot) => {
            const currentMessageCount = snapshot.size;
            const isNewMessage = currentMessageCount > previousMessageCount && previousMessageCount > 0;
            const lastDoc = snapshot.docs[snapshot.docs.length - 1];
            const lastMsgData = lastDoc ? lastDoc.data() : null;
            const isFromOtherUser = lastMsgData && lastMsgData.enviadoPor !== currentUser.email;

            messagesArea.innerHTML = '';

            if (snapshot.empty) {
                messagesArea.innerHTML = '<div class="no-conversations"><p>Envie uma mensagem para começar!</p></div>';
                previousMessageCount = 0;
                return;
            }

            snapshot.forEach(doc => {
                const message = doc.data();
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.enviadoPor === currentUser.email ? 'sent' : 'received'}`;

                // Se for imagem
                if (message.tipo === 'imagem' && message.imagem) {
                    const img = document.createElement('img');
                    img.className = 'message-image';
                    img.src = message.imagem;
                    img.alt = 'Foto';
                    img.onclick = () => {
                        viewerImage.src = message.imagem;
                        imageViewer.classList.add('active');
                    };
                    messageDiv.appendChild(img);
                } else if (message.texto) {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'message-text';
                    textDiv.textContent = message.texto;
                    messageDiv.appendChild(textDiv);
                }

                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                const time = message.timestamp ? message.timestamp.toDate() : new Date();
                timeDiv.textContent = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                messageDiv.appendChild(timeDiv);
                messagesArea.appendChild(messageDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;

            // 🔔 NOTIFICAÇÃO: tocar som e piscar nome quando chega nova mensagem do outro usuário
            if (isNewMessage && isFromOtherUser) {
                playNotificationSound();
                chatContactName.classList.add('blinking');
                
                // Remover piscar após 5 segundos
                setTimeout(() => {
                    chatContactName.classList.remove('blinking');
                }, 5000);
            }

            previousMessageCount = currentMessageCount;
        });
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentChat) return;

        const conversationId = getConversationId(currentUser.email, currentChat.contactEmail);

        try {
            await addDoc(collection(db, "conversas", conversationId, "mensagens"), {
                texto: text,
                tipo: 'texto',
                enviadoPor: currentUser.email,
                timestamp: serverTimestamp()
            });
            messageInput.value = '';
        } catch (error) {
            console.error('Erro ao enviar mensagem:', error);
            alert('Erro ao enviar mensagem');
        }
    }

    // ========== FUNÇÃO LIMPAR MENSAGENS ==========
    async function clearMessages() {
        if (!currentChat) return;
        
        if (!confirm('Tem certeza que deseja apagar TODAS as mensagens desta conversa? Esta ação não pode ser desfeita.')) {
            return;
        }

        const conversationId = getConversationId(currentUser.email, currentChat.contactEmail);
        const messagesRef = collection(db, "conversas", conversationId, "mensagens");
        const messagesQuery = query(messagesRef);

        try {            const snapshot = await getDocs(messagesQuery);
            if (snapshot.empty) {
                showToast('ℹ️ Não há mensagens para apagar');
                return;
            }

            // Usar batch para deletar múltiplos documentos (limite de 500 por batch)
            const batchSize = 500;
            const docs = snapshot.docs;
            
            for (let i = 0; i < docs.length; i += batchSize) {
                const batch = writeBatch(db);
                const batchDocs = docs.slice(i, i + batchSize);
                batchDocs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
            }

            showToast('✅ Conversa apagada com sucesso!');
            chatMenu.classList.remove('show');
        } catch (error) {
            console.error('Erro ao limpar mensagens:', error);
            alert('Erro ao limpar mensagens: ' + error.message);
        }
    }

    // ========== FUNÇÃO ENVIAR FOTO ==========
    async function sendImage(file, isFromCamera) {
        if (!file || !currentChat) return;

        if (!file.type.startsWith('image/')) {
            showToast('❌ Selecione uma imagem válida');
            return;
        }

        // Limitar tamanho a 2MB para caber no Firestore (limite de 1MB por documento)
        if (file.size > 2 * 1024 * 1024) {
            showToast('❌ Imagem muito grande. Máximo 2MB.');
            return;
        }

        showToast('📤 Enviando foto...');

        const reader = new FileReader();
        reader.onload = async function(e) {
            const imageData = e.target.result;
            const conversationId = getConversationId(currentUser.email, currentChat.contactEmail);

            try {                await addDoc(collection(db, "conversas", conversationId, "mensagens"), {
                    tipo: 'imagem',
                    imagem: imageData,
                    enviadoPor: currentUser.email,
                    origem: isFromCamera ? 'camera' : 'galeria',
                    timestamp: serverTimestamp()
                });
                showToast('✅ Foto enviada!');
                chatMenu.classList.remove('show');
            } catch (error) {
                console.error('Erro ao enviar foto:', error);
                alert('Erro ao enviar foto: ' + error.message);
            }
        };
        reader.onerror = function() {
            showToast('❌ Erro ao carregar imagem');
        };
        reader.readAsDataURL(file);
    }

    // ========== FUNÇÕES AUXILIARES ==========
    function getConversationId(user1, user2) {
        return [user1, user2].sort().join('_');
    }

    function showLoginScreen() {
        loginScreen.style.display = 'flex';
        mainScreen.classList.remove('active');
        chatScreen.classList.remove('active');
    }

    function showMainScreen() {
        loginScreen.style.display = 'none';
        mainScreen.classList.add('active');
        chatScreen.classList.remove('active');
    }

    function openAddContactModal() {
        addContactModal.classList.add('active');
        settingsMenu.classList.remove('show');
    }

    function closeAddContactModal() {
        addContactModal.classList.remove('active');
        document.getElementById('new-contact-email').value = '';
        document.getElementById('new-contact-name').value = '';
    }

    function toggleChatMenu(e) {
        e.stopPropagation();        chatMenu.classList.toggle('show');
    }

    function toggleSettingsMenu(e) {
        e.stopPropagation();
        settingsMenu.classList.toggle('show');
    }

    // ========== EVENT LISTENERS ==========
    loginBtn.onclick = login;
    registerBtn.onclick = register;
    logoutBtn.onclick = logout;
    addContactBtn.onclick = openAddContactModal;
    backBtn.onclick = closeChat;
    sendBtn.onclick = sendMessage;
    cancelAddContact.onclick = closeAddContactModal;
    confirmAddContact.onclick = addContact;
    chatMenuBtn.onclick = toggleChatMenu;
    settingsBtn.onclick = toggleSettingsMenu;

    // Fechar menus ao clicar fora
    document.addEventListener('click', (e) => {
        if (!chatMenu.contains(e.target) && !chatMenuBtn.contains(e.target)) {
            chatMenu.classList.remove('show');
        }
        if (!settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
            settingsMenu.classList.remove('show');
        }
    });

    // Fechar visualizador de imagem
    imageViewer.onclick = () => {
        imageViewer.classList.remove('active');
    };

    // Menu do Chat - Limpar mensagens
    document.getElementById('menu-clear-messages').onclick = clearMessages;

    // Menu do Chat - Câmera
    document.getElementById('menu-camera').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('camera-input').click();
    };

    document.getElementById('camera-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            sendImage(file, true);
            e.target.value = '';
        }    });

    // Menu do Chat - Galeria
    document.getElementById('menu-gallery').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('gallery-input').click();
    };

    document.getElementById('gallery-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            sendImage(file, false);
            e.target.value = '';
        }
    });

    // Menu do Chat - Som de Notificação
    document.getElementById('menu-sound').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('sound-input').click();
    };

    document.getElementById('sound-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            handleSoundFile(file);
            e.target.value = '';
        }
    });

    // Menu da Engrenagem (Tela Principal) - Som de Notificação
    document.getElementById('settings-sound').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('settings-sound-input').click();
    };

    document.getElementById('settings-sound-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            handleSoundFile(file);
            e.target.value = '';
        }
    });

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Monitorar estado de autenticação
    onAuthStateChanged(auth, (user) => {        if (user) {
            currentUser = user;
            showMainScreen();
            loadSavedSound();
            loadContacts();
        } else {
            currentUser = null;
            showLoginScreen();
        }
    });

    console.log('✅ iChat carregado com sucesso!');
</script>
